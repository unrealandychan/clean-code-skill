name: Generate Release Notes

# Triggers:
#   1. Automatically when a version tag is pushed (v*)
#   2. Manually via workflow_dispatch for testing or retroactive runs
on:
  push:
    tags:
      - 'v[0-9]*'       # v1.0.0, v0.5.0, etc.
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to generate notes for (e.g. 0.5.0 or v0.5.0). Defaults to latest tag.'
        required: false
        default: ''
      llm:
        description: 'LLM backend to use'
        required: false
        default: 'claude'
        type: choice
        options:
          - claude
          - github-models
      dry_run:
        description: 'Dry run — print entry without opening a PR'
        required: false
        default: false
        type: boolean

permissions:
  contents: write      # push the release-notes branch
  pull-requests: write # open the PR

jobs:
  generate:
    name: Generate & PR
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout with full history so git log works ──────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0         # required: we need all tags and commit history
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Resolve version from input or tag event ──────────────────────────
      - name: Resolve version
        id: version
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            # Triggered by tag push — use the tag that triggered the workflow
            TAG="${GITHUB_REF#refs/tags/}"
            echo "value=$TAG" >> "$GITHUB_OUTPUT"
          fi

      # ── 3. Resolve LLM backend ──────────────────────────────────────────────
      - name: Resolve LLM
        id: llm
        run: |
          LLM="${{ inputs.llm || 'claude' }}"
          # Auto-downgrade to github-models if no Anthropic key is available
          if [[ "$LLM" == "claude" ]] && [[ -z "${{ secrets.ANTHROPIC_API_KEY }}" ]]; then
            echo "WARN: ANTHROPIC_API_KEY not set — falling back to github-models"
            LLM="github-models"
          fi
          echo "value=$LLM" >> "$GITHUB_OUTPUT"

      # ── 4. Install jq (already present on ubuntu-latest, but explicit is safe) ─
      - name: Ensure jq is available
        run: jq --version

      # ── 5. Generate the release notes entry ─────────────────────────────────
      - name: Generate release notes entry
        id: generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x scripts/generate-release-notes.sh

          FLAGS="--version ${{ steps.version.outputs.value }} --llm ${{ steps.llm.outputs.value }}"
          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            FLAGS="$FLAGS --dry-run"
          fi

          bash scripts/generate-release-notes.sh $FLAGS

      # ── 6. Stop here for dry runs ────────────────────────────────────────────
      - name: Skip PR (dry run)
        if: ${{ inputs.dry_run == true }}
        run: echo "Dry run complete — no PR opened."

      # ── 7. Open a PR so a human reviews before merging ──────────────────────
      - name: Create pull request
        if: ${{ inputs.dry_run != true }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          BRANCH="release-notes/${VERSION}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add RELEASE-NOTES.md
          git diff --cached --quiet && echo "No changes to commit" && exit 0

          git commit -m "docs(release): add release notes for ${VERSION}

          Auto-generated by the 'Generate Release Notes' workflow using ${{ steps.llm.outputs.value }}.
          Review the entry for accuracy before merging."

          git push origin "$BRANCH"

          gh pr create \
            --title "docs(release): release notes for ${VERSION}" \
            --body "## Auto-generated release notes for \`${VERSION}\`

          Generated by the [Generate Release Notes](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) workflow using **${{ steps.llm.outputs.value }}**.

          ### Review checklist
          - [ ] Bullet points accurately describe the changes (not just echoing commit subjects)
          - [ ] Breaking changes section is present if any commit has a \`BREAKING CHANGE\` footer
          - [ ] Version and date are correct
          - [ ] No invented changes

          Merge this PR to publish the release notes." \
            --base main \
            --head "$BRANCH" \
            --label "release" || \
          gh pr create \
            --title "docs(release): release notes for ${VERSION}" \
            --body "Auto-generated release notes. Review before merging." \
            --base main \
            --head "$BRANCH"
